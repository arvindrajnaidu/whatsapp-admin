services:
  whatsapp-admin:
    build: .
    ports:
      - "3000:3000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHATSAPP_HOST: ${WHATSAPP_HOST:-http://host.docker.internal:3100}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
    volumes:
      - admin_data:/app/data
    init: true
    restart: unless-stopped

volumes:
  admin_data:
