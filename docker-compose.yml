services:
  whatsapp-admin:
    build: .
    ports:
      - "3000:3000"
      - "3100:3100"
      - "3300:3300"
    environment:
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BUZZIE_API_PORT: "3100"
    volumes:
      - admin_data:/app/data
      - whatsapp_data:/root/.whatsapp-cli
      - voice_data:/root/.voice-cli
    init: true
    restart: unless-stopped

volumes:
  admin_data:
  whatsapp_data:
  voice_data:
